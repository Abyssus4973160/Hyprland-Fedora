# Monitors
monitor = eDP-1,1920x1080@60,0x0,1
monitor = HDMI-A-1,1920x1080@144,1920x0,1
monitor = DP-2,1920x1080@144,1920x-1080,1



# monitor = eDP-1,disable
# monitor = HDMI-A-1,disable
# monitor = DP-2, disable

# Autostarts
exec-once = /home/abyssus00/.config/hypr/scripts/opacity.sh
exec-once = swww-daemon
exec-once = ~/.config/hypr/scripts/set_wallpaper.sh
exec-once = qs -c noctalia-shell

# Environment Variables
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = _JAVA_AWT_WM_NONEREPARENTING,1
env = GDK_BACKEND,wayland,x11,*


# Look and Feel
general {
  gaps_in = 5
  gaps_out = 10

  border_size = 0

  col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
  col.inactive_border = rgba(595959aa)

  resize_on_border = true

  allow_tearing = false

  layout = dwindle
} 

decoration {
  rounding = 10
  rounding_power = 2

  active_opacity = 1
  inactive_opacity = 1

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  } 

  blur {
    enabled = true
    size = 5
    passes = 1
    new_optimizations = true
    noise = 0
    brightness = 1
  } 
} 

animations {
    enabled = true
    # Curves
    bezier = expressiveFastSpatial, 0.42, 1.67, 0.21, 0.90
    bezier = expressiveSlowSpatial, 0.39, 1.29, 0.35, 0.98
    bezier = expressiveDefaultSpatial, 0.38, 1.21, 0.22, 1.00
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
    bezier = standardDecel, 0, 0, 0, 1
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.52, 0.03, 0.72, 0.08
    bezier = stall, 1, -0.1, 0.7, 0.85
    # Configs
    # windows
    animation = windowsIn, 1, 3, emphasizedDecel, popin 80%
    animation = fadeIn, 1, 3, emphasizedDecel
    animation = windowsOut, 1, 2, emphasizedDecel, popin 90%
    animation = fadeOut, 1, 2, emphasizedDecel
    animation = windowsMove, 1, 3, emphasizedDecel, slide
    animation = border, 1, 10, emphasizedDecel
    # layers
    animation = layersIn, 1, 2.7, emphasizedDecel, popin 93%
    animation = layersOut, 1, 2.4, menu_accel, popin 94%
    # fade
    animation = fadeLayersIn, 1, 0.5, menu_decel
    animation = fadeLayersOut, 1, 2.7, stall
    # workspaces
    animation = workspaces, 1, 7, menu_decel, slide
    ## specialWorkspace
    animation = specialWorkspaceIn, 1, 2.8, emphasizedDecel, slidevert
    animation = specialWorkspaceOut, 1, 1.2, emphasizedAccel, slidevert
    # zoom
    animation = zoomFactor, 1, 3, standardDecel
}

# dwindle {
#  pseudotile = true
#  preserve_split = true

# } 

master {
  new_status = master
} 

misc {
  force_default_wallpaper = 0
  disable_hyprland_logo = true
} 


# Iput
input {
  kb_layout = es,us
  kb_options = grp:win_space_toggle

  follow_mouse = 1

  sensitivity = 0
  touchpad {
    natural_scroll = false
  } 
} 

gestures {
 # workspace_swipe = true
} 

device {
  name = epic-mouse-v1
  sensitivity = 0
} 


# Keybinds
$mainMod = SUPER

bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, nautilus
bind = $mainMod, V, exec, /home/abyssus00/.config/hypr/scripts/flotantes.sh
bind = $mainMod, R, exec,  bash /home/abyssus00/.config/rofi/launcher.sh
bind = $mainMod, O, exec, /home/abyssus00/.config/hypr/scripts/opacity.sh
bind = $mainMod, L, fullscreen
bind = $mainMod, F, exec, firefox
bind = $mainMod, I, exec, hyprsettings
bind = $mainMod, B, exec, nmcli radio wifi off
bind = $mainMod, N, exec, nmcli radio wifi on

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, C, togglespecialworkspace, magic
bind = $mainMod SHIFT, C, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


# Windowrules
animation = layersIn, 1, 4, default, popin 90%
animation = layersOut, 1, 3, default, popin 90%

#layerrulev2 = blur:enabled, ^(.*)$
#layerrulev2 = ignorealpha:0.3, ^(.*)$

windowrule {
  name = windowrule-1
  float = on
  match:class = ^(com.gabm.satty)$
}

windowrule {
  name = windowrule-1
  float = on
  match:class = ^(Toplevel)$
}

xwayland {
    force_zero_scaling = true
}
